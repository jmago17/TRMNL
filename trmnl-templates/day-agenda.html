<!-- TRMNL Private Plugin: Day Agenda -->
<!-- Strategy: Webhook | Layout: Full -->
<!-- Webhook merge_variables: { "title": "Thursday, Feb 19", "events": [{"time":"09:00","name":"Standup","location":"Zoom"},..] } -->

<div style="width:800px;height:480px;font-family:sans-serif;padding:16px;box-sizing:border-box;background:#fff;">
  <div style="font-size:28px;font-weight:bold;margin-bottom:12px;border-bottom:2px solid #000;padding-bottom:8px;">
    {{ title }}
  </div>

  {% if events.size > 0 %}
    {% for event in events %}
      <div style="display:flex;align-items:baseline;padding:6px 0;{% unless forloop.last %}border-bottom:1px solid #ccc;{% endunless %}">
        <div style="width:100px;font-size:18px;font-weight:bold;flex-shrink:0;">
          {{ event.time }}
        </div>
        <div style="flex:1;font-size:18px;">
          {{ event.name }}
          {% if event.location != blank %}
            <span style="font-size:14px;color:#666;"> — {{ event.location }}</span>
          {% endif %}
        </div>
      </div>
    {% endfor %}
  {% else %}
    <div style="font-size:22px;color:#888;text-align:center;margin-top:120px;">
      Gaur ez dago gertaerarik
    </div>
  {% endif %}
</div>
